  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

) format(\"woff2\"),\n       url(\"3fad3356-a26c-419d-9f48-4afb28dfe6b5\") format(\"woff2\");\n}\n\n/* ---------- Tokens ---------- */\n\n:root {\n  /* ——— Core brand palette ——— */\n  --twc-red:        #EF003C;  /* PRIMARY — isotipo, CTAs hero, color dominante de marca */\n  --twc-blue:       #2700FF;  /* ACCENT — fondos destacados, titulares, links, secciones */\n  --twc-gray:       #CACACA;  /* neutral de soporte — fondos secundarios, borders */\n  --twc-white:      #FFFFFF;  /* base */\n  --twc-black:      #0A0A0F;  /* texto extremo cuando azul es demasiado */\n\n  /* Tonal shifts derived from the brand trio. Use sparingly — brand is flat. */\n  --twc-blue-900:   #1A00B3;  /* pressed / darker surface */\n  --twc-blue-100:   #E8E4FF;  /* tinted background for blue callouts on white */\n  --twc-red-900:    #B3002D;  /* pressed */\n  --twc-red-100:    #FDE0E7;  /* tinted background for red callouts on white */\n  --twc-gray-50:    #F7F7F7;  /* page canvas */\n  --twc-gray-100:   #EFEFEF;\n  --twc-gray-200:   #E3E3E3;\n  --twc-gray-300:   #CACACA;  /* = --twc-gray */\n  --twc-gray-500:   #8A8A8A;\n  --twc-gray-700:   #4A4A4A;\n  --twc-gray-900:   #1A1A1A;\n\n  /* ——— Semantic surfaces ——— */\n  --bg:             var(--twc-white);\n  --bg-muted:       var(--twc-gray-50);\n  --bg-brand:       var(--twc-red);\n  --bg-accent:      var(--twc-blue);\n  --surface:        var(--twc-white);\n  --surface-muted:  var(--twc-gray-50);\n  --border:         var(--twc-gray-200);\n  --border-strong:  var(--twc-gray-300);\n\n  /* ——— Semantic text ——— */\n  --fg1:            var(--twc-black);   /* primary body */\n  --fg2:            var(--twc-gray-700);/* secondary body */\n  --fg3:            var(--twc-gray-500);/* tertiary / captions */\n  --fg-brand:       var(--twc-red);    /* emphasis / primary brand color */\n  --fg-accent:      var(--twc-blue);    /* accent text (links, secondary emphasis) */\n  --fg-on-brand:    var(--twc-white);   /* text on red fills */\n  --fg-on-accent:  0.95;\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n}\n\n.twc-hero {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-4xl);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n}\n\n.twc-lede {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--text-md);\n  line-height: var(--lh-relaxed);\n  color: var(--fg2);\n}\n\np, .twc-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--text-base);\n  line-height: var(--lh-normal);\n  color: var(--fg1);\n  margin: 0;\n  text-wrap: pretty;\n}\n\n.twc-caption {\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: var(--text-xs);\n  line-height: var(--lh-normal);\n  color: var(--fg3);\n}\n\n.twc-eyebrow,\n.twc-overline {\n  font-family: var(--font-body);\n  font-weight: 700;\n  font-size: var(--text-xs);\n  line-height: 1.2;\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--fg-accent);\n}\n\ncode, .twc-code {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  background: var(--surface-muted);\n  padding: 0.1em 0.35em;\n  border-radius: var(--radius-xs);\n  border: 1px solid var(--border);\n}\n\na, .twc-link {\n  color: var(--fg-brand);\n  text-decoration: none;\n  border-bottom: 1.5px solid currentColor;\n  transition: opacity var(--dur-fast) var(--ease-standard);\n}\na:hover, .twc-link:hover { opacity: 0.7; }\n\n/* ---------- Utilities ---------- */\n\n.twc-bg-blue   { background: var(--twc-blue); color: var(--fg-on-brand); }\n.twc-bg-red    { background: var(--twc-red);  color: var(--fg-on-accent); }\n.twc-bg-white  { background: var(--twc-white); color: var(--fg1); }\n.twc-bg-muted  { background: var(--bg-muted);  color: var(--fg1); }\n\n.twc-text-blue  { color: var(--twc-blue); }\n.twc-text-red   { color: var(--twc-red); }\n.twc-text-white { color: var(--twc-white); }\n\n.twc-border    { border: 1px solid var(--border); }\n.twc-border-strong { border: 1px solid var(--border-strong); }\n\n.twc-rounded-sm { border-radius: var(--radius-sm); }\n.twc-rounded-md { border-radius: var(--radius-md); }\n.twc-rounded-lg { border-radius: var(--radius-lg); }\n.twc-rounded-pill { border-radius: var(--radius-pill); }\n<\u002Fstyle>\n<script src=\"a6d1309f-a0c5-41c6-a2a1-081531ab260c\"><\u002Fscript>\n<style>\n  deck-stage { --deck-bg: #0A0A0F; }\n\n  section {\n    width: 1920px; height: 1080px;\n    box-sizing: border-box;\n    overflow: hidden;\n    position: relative;\n    font-family: var(--font-body);\n    color: var(--fg1);\n    background: var(--twc-white);\n  }\n\n  .s-pad { padding: 80px 120px; }\n\n  .eyebrow {\n    font-family: var(--font-body); font-weight: 700;\n    font-size: 18px; letter-spacing: 0.06em;\n    text-transform: uppercase; color: var(--twc-red);\n    margin-bottom: 16px;\n  }\n  .eyebrow-white { color: rgba(255,255,255,0.7); }\n\n  .slide-title {\n    font-family: var(--font-display); font-weight: 700;\n    font-size: 56px; line-height: 1.08;\n    letter-spacing: -0.02em; text-transform: uppercase;\n    margin: 0 0 28px 0;\n  }\n\n  .body-lg {\n    font-size: 26px; line-height: 1.55; color: var(--fg2);\n  }\n  .body-md {\n    font-size: 24px; line-height: 1.5;\n  }\n\n  .big-number {\n    font-family: var(--font-display); font-weight: 700;\n    font-size: 72px; line-height: 1; letter-spacing: -0.02em;\n  }\n\n  .card {\n    background: var(--twc-white);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-md);\n    padding: 36px;\n  }\n\n  .card-dark {\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.12);\n    border-radius: var(--radius-md);\n    padding: 36px;\n    color: white;\n  }\n\n  .callout {\n    background: var(--twc-red);\n    border-radius: var(--radius-md);\n    padding: 32px 40px;\n    font-size: 24px; line-height: 1.55;\n    color: white; font-weight: 500;\n  }\n  .callout-light {\n    background: var(--twc-red-100);\n    color: var(--twc-red-900);\n  }\n  .callout-yellow {\n    background: #FFF8E1;\n    color: #5D4500;\n  }\n\n  .watermark {\n    position: absolute;\n    opacity: 0.07;\n    pointer-events: none;\n  }\n\n  .pain-card {\n    background: var(--twc-red-100);\n    border-radius: var(--radius-md);\n    padding: 36px;\n    flex: 1;\n  }\n\n  table.clean {\n    width: 100%; border-collapse: collapse;\n    font-size: 24px;\n  }\n  table.clean th {\n    text-align: left; font-weight: 700;\n    padding: 16px 24px;\n    border-bottom: 2px solid var(--border);\n    font-size: 18px; letter-spacing: 0.04em;\n    text-transform: uppercase; color: var(--fg3);\n  }\n  table.clean td {\n    padding: 18px 24px;\n    border-bottom: 1px solid var(--border);\n    vertical-align: top; line-height: 1.45;\n  }\n  table.clean tr:last-child td { border-bottom: none; }\n\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }\n  .flex-row { display: flex; gap: 24px; }\n\n  .pill {\n    display: inline-block;\n    background: var(--twc-red-100); color: var(--twc-red);\n    font-size: 16px; font-weight: 700;\n    padding: 6px 18px; border-radius: var(--radius-pill);\n    letter-spacing: 0.02em; text-transform: uppercase;\n  }\n  .pill-blue { background: var(--twc-blue-100); color: var(--twc-blue); }\n  .pill-gray { background: var(--twc-gray-100); color: var(--twc-gray-700); }\n  .pill-green { background: #E6F9E6; color: #1B7A1B; }\n  .pill-white { background: rgba(255,255,255,0.15); color: white; }\n\n  .blockquote {\n    font-size: 30px; line-height: 1.45;\n    font-weight: 500;\n    border-left: 5px solid var(--twc-red);\n    padding-left: 32px;\n    color: var(--fg1);\n  }\n\n  .s-red { background: var(--twc-red); color: white; }\n  .s-dark { background: var(--twc-black); color: white; }\n  .s-muted { background: var(--twc-gray-50); }\n\n  .footer-sm {\n    position: absolute; bottom: 28px; left: 120px;\n    font-size: 16px; color: var(--fg3);\n  }\n  .footer-sm-white {\n    position: absolute; bottom: 28px; left: 120px;\n    font-size: 16px; color: rgba(255,255,255,0.35);\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<deck-stage>\n\n<!-- ══════ SLIDE 1 — PORTADA ══════ -->\n<section data-screen-label=\"01 Portada\" class=\"s-pad\" style=\"display:flex; flex-direction:column; justify-content:center;\">\n  <img src=\"fbe5e9bd-dcd8-40e3-bdd2-84716bf0ebca\" alt=\"\" class=\"watermark\" style=\"right:-40px; bottom:-40px; width:520px;\">\n  <div style=\"margin-bottom:48px;\">\n    <img src=\"c912d473-8624-4527-82c7-00b6f83f4261\" alt=\"TWC\" style=\"height:44px;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:var(--font-display); font-weight:700; font-size:80px; line-height:1.02; letter-spacing:-0.02em; text-transform:uppercase; color:var(--twc-black); margin:0 0 32px 0; max-width:1200px;\">\n    Viajero,<br><span style=\"color:var(--twc-red);\">esto apenas comienza.<\u002Fspan>\n  <\u002Fh1>\n  <p style=\"font-size:28px; color:var(--fg2); font-weight:400; max-width:900px; line-height:1.5; margin-bottom:48px;\">\n    Partnership Anual de Adopción y Evolución<br>del Espacio de Trabajo en Notion\n  <\u002Fp>\n  <div style=\"display:flex; gap:40px; font-size:20px; color:var(--fg3);\">\n    <span>Cliente: <strong style=\"color:var(--fg1);\">Viajero Hostels<\u002Fstrong><\u002Fspan>\n    <span>Mayo 2026<\u002Fspan>\n    <span>Sebastián Martínez &amp; Roxana Rodríguez<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════ SLIDE 2 — SITUACIÓN ACTUAL ══════ -->\n<section data-screen-label=\"02 Situación actual\" class=\"s-pad\">\n  <img src=\"fbe5e9bd-dcd8-40e3-bdd2-84716bf0ebca\" alt=\"\" class=\"watermark\" style=\"right:40px; bottom:40px; width:340px;\">\n  <p class=\"eyebrow\">Contexto<\u002Fp>\n  <p class=\"slide-title\" style=\"margin-bottom:20px;\">Dónde estamos hoy<\u002Fp>\n  <p class=\"body-lg\" style=\"max-width:1200p
